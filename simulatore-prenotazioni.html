<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="robots" content="noindex"/>
<title>Sistema di prenotazione diretta — Simulatore</title>
<!--
  ============================================================================
  SIMULATORE PRENOTAZIONE DIRETTA — asset di outreach per B&B / case vacanze.
  Stessa idea del simulatore beauty: standalone, self-contained, lo MANDI al lead
  (link) e lui lo sfoglia da solo. Auto-play + frecce/pallini. Niente foto sue:
  vende il SISTEMA che lavora (notifiche, conferme, pannello, risparmio Booking).

  Le 7 tappe = capacità reali del sistema Casa Tolomea (edge function):
    01 prenotazione diretta (nuova-richiesta/conferma) · 02 conferma + check-in
    03 sync calendario sito<->Booking (hyper-responder/ical) · 04 lista d'attesa (posto-libero)
    05 promemoria pre-arrivo (promemoria) · 06 recensione col filtro (recensione)
    07 ospite di ritorno / win-back (riattivazione)
  Se un giorno una di queste NON è attiva sul sistema che vendi, TOGLILA:
  non promettere un automatismo che non c'è (regola onestà di Simone).

  >>> PER OGNI LEAD: cambia SOLO il blocco BRAND qui sotto (nome + iniziale +
      città). `sito` va tenuto REALE (l'URL del demo che il lead riceve): è
      quello che compare nella barra del browser delle scene pannello.

  I numeri dei pannelli sono di esempio e marcati a schermo "di esempio":
  senza una voce che lo dica, non devono passare per risultati promessi.

  Comandi: Spazio = play/pausa · ←/→ = scena · R = ricomincia · H = barra
  ============================================================================
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Montserrat:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  /* ── palette boutique-hospitality (ribrandizzabile dal blocco BRAND) ── */
  --bronzo:#b07a4e; --bronzo-dark:#8a5c38; --gold:#d8b26a;
  --espresso:#0e2a33; --espresso-2:#123842;
  --crema:#f4ede0; --crema-soft:#e8dcc8; --sabbia:#dfcfb2;
  --ink:#22303a; --muted:#9db0b3;
  --ok:#4f9d86; --warn:#c58a3a;
  --font-serif:'Cormorant Garamond', Georgia, serif;
  --font-title:'Poppins', sans-serif;
  --font-body:'Montserrat', sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--font-body); color:var(--crema);
  background:
    radial-gradient(1200px 700px at 80% -10%, rgba(216,178,106,.14), transparent 60%),
    radial-gradient(900px 600px at 10% 120%, rgba(79,157,134,.16), transparent 55%),
    linear-gradient(160deg,#0a1f26,#0e2a33 55%,#123842);
  overflow:hidden;
}
.stage-wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:3vh 3vw 124px}
.stage{position:relative;width:min(1180px,94vw);height:min(720px,86vh);perspective:1600px}

.scene{position:absolute;inset:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .6s ease}
.scene.on{opacity:1;pointer-events:auto}

.eyebrow{font-family:var(--font-title);font-size:.72rem;letter-spacing:.32em;text-transform:uppercase;color:var(--gold);font-weight:600}
.serif{font-family:var(--font-serif);font-weight:600;line-height:1.05}
.italic{font-style:italic;color:var(--gold)}

/* ── brand bar ─────────────────────────────────────────────────────── */
.brandbar{position:fixed;top:26px;left:34px;display:flex;align-items:center;gap:14px;z-index:20}
.brandmark{width:46px;height:46px;border-radius:50%;
  background:linear-gradient(145deg,var(--gold),var(--bronzo-dark));
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-serif);font-size:1.15rem;color:#fff;font-weight:600;
  box-shadow:0 6px 20px rgba(0,0,0,.4), inset 0 1px 2px rgba(255,255,255,.3)}
.brandbar .n{font-family:var(--font-serif);font-size:1.35rem;line-height:1;color:var(--crema)}
.brandbar .s{font-family:var(--font-title);font-size:.6rem;letter-spacing:.28em;text-transform:uppercase;color:var(--muted);margin-top:3px}
.livepill{position:fixed;top:30px;right:34px;z-index:20;display:flex;align-items:center;gap:9px;
  font-family:var(--font-title);font-size:.62rem;letter-spacing:.22em;text-transform:uppercase;
  color:var(--crema);background:rgba(79,157,134,.14);border:1px solid rgba(79,157,134,.4);
  padding:9px 16px;border-radius:100px}
.livepill .dot{width:9px;height:9px;border-radius:50%;background:var(--ok);
  box-shadow:0 0 0 0 rgba(79,157,134,.6);animation:pulse 2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(79,157,134,.55)}70%{box-shadow:0 0 0 12px rgba(79,157,134,0)}100%{box-shadow:0 0 0 0 rgba(79,157,134,0)}}

/* ── cover ─────────────────────────────────────────────────────────── */
.cover{align-items:center;justify-content:center;text-align:center}
.cover .eyebrow{margin-bottom:22px}
.cover h1{font-size:clamp(2.6rem,6vw,4.4rem);color:var(--crema);max-width:17ch}
.cover .sub{font-family:var(--font-body);font-weight:300;color:var(--muted);
  font-size:clamp(1rem,1.6vw,1.2rem);margin-top:26px;max-width:48ch;line-height:1.6}
.cover .hint{margin-top:46px;font-family:var(--font-title);font-size:.66rem;letter-spacing:.24em;
  text-transform:uppercase;color:var(--bronzo);opacity:.9}

/* ── scena automazione: lista + telefono ───────────────────────────── */
.auto{flex-direction:row;gap:40px;align-items:center}
.auto .left{flex:1;min-width:0}
.auto .kicker{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.auto .kicker .num{font-family:var(--font-title);font-size:.7rem;letter-spacing:.2em;color:var(--muted)}
.auto h2{font-size:clamp(2rem,3.4vw,2.9rem);color:var(--crema);margin:6px 0 4px}
.trigger{display:inline-flex;align-items:center;gap:10px;margin:18px 0 22px;
  background:rgba(216,178,106,.1);border:1px solid rgba(216,178,106,.28);
  padding:10px 16px;border-radius:100px;font-size:.82rem;color:var(--crema)}
.trigger .tlab{font-family:var(--font-title);font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold)}
.benefit{display:flex;align-items:flex-start;gap:12px;font-size:1.02rem;color:var(--crema-soft);line-height:1.55;max-width:42ch;margin-top:8px}
.benefit svg{flex:none;margin-top:3px}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:26px}
.chip{font-family:var(--font-title);font-size:.6rem;letter-spacing:.16em;text-transform:uppercase;
  color:var(--muted);border:1px solid rgba(157,176,179,.28);padding:7px 12px;border-radius:8px;transition:.4s}
.chip.active{color:var(--espresso);background:linear-gradient(145deg,var(--gold),var(--bronzo));border-color:transparent;font-weight:600}
.chip.done{color:var(--ok);border-color:rgba(79,157,134,.4)}

/* telefono */
.phone{flex:none;width:320px;height:560px;border-radius:44px;position:relative;
  background:linear-gradient(160deg,#16333c,#0d2028);
  border:2px solid rgba(216,178,106,.22);
  box-shadow:0 40px 80px rgba(0,0,0,.55), inset 0 1px 3px rgba(255,255,255,.08);padding:16px}
.phone::before{content:"";position:absolute;top:16px;left:50%;transform:translateX(-50%);
  width:120px;height:26px;background:#081419;border-radius:0 0 16px 16px;z-index:3}
.screen{width:100%;height:100%;border-radius:32px;background:linear-gradient(180deg,#f7f2ea,#efe7d8);
  overflow:hidden;position:relative;display:flex;flex-direction:column}
.statusbar{display:flex;justify-content:space-between;align-items:center;padding:30px 22px 8px;
  color:var(--ink);font-size:.7rem;font-weight:600;font-family:var(--font-title);gap:10px}
.statusbar .nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:62%}
.notif-head{padding:6px 18px 12px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(176,122,78,.14)}
.notif-head .ic{width:34px;height:34px;border-radius:9px;background:linear-gradient(145deg,var(--gold),var(--bronzo));display:flex;align-items:center;justify-content:center}
.notif-head .t{font-family:var(--font-title);font-weight:600;font-size:.78rem;color:var(--ink)}
.notif-head .t span{display:block;font-weight:400;font-size:.62rem;color:#9c8b70;margin-top:2px}
.thread{flex:1;padding:20px 18px;display:flex;flex-direction:column;gap:14px;overflow:hidden}
.bubble{background:#fff;border-radius:18px 18px 18px 6px;padding:14px 16px;color:var(--ink);
  font-size:.82rem;line-height:1.5;box-shadow:0 8px 22px rgba(90,70,40,.12);max-width:90%;opacity:0;transform:translateY(18px)}
.bubble.in{animation:bubbleIn .55s cubic-bezier(.2,.8,.2,1) forwards}
.bubble .top{font-family:var(--font-title);font-weight:600;font-size:.72rem;color:var(--bronzo-dark);margin-bottom:6px}
.bubble .cta{margin-top:12px;display:table;background:linear-gradient(145deg,var(--bronzo),var(--bronzo-dark));
  color:#fff;font-family:var(--font-title);font-weight:600;font-size:.68rem;padding:9px 16px;border-radius:9px}
@keyframes bubbleIn{to{opacity:1;transform:translateY(0)}}
.sent{margin-top:auto;display:flex;align-items:center;gap:9px;justify-content:center;
  font-family:var(--font-title);font-size:.66rem;letter-spacing:.06em;color:var(--ok);
  background:rgba(79,157,134,.12);padding:11px;border-radius:12px;opacity:0}
.sent.in{animation:bubbleIn .5s ease forwards;animation-delay:.5s}

.stars{display:flex;gap:6px;justify-content:center;margin:8px 0 4px}
.stars svg{width:26px;height:26px}
.route{display:flex;gap:10px;margin-top:20px;max-width:42ch}
.route .r{flex:1;text-align:left;padding:12px 14px;border-radius:11px;font-size:.7rem;font-family:var(--font-title);font-weight:600;line-height:1.45}
.route .g{background:rgba(79,157,134,.16);color:#8fd0bb;border:1px solid rgba(79,157,134,.4)}
.route .p{background:rgba(197,138,58,.14);color:#dcab6d;border:1px solid rgba(197,138,58,.34)}

/* ── scena PANNELLO (browser frame) ────────────────────────────────── */
.admin{align-items:center;justify-content:center}
.browser{width:100%;max-width:1080px;height:100%;max-height:660px;border-radius:16px;overflow:hidden;
  background:#fff;color:var(--ink);box-shadow:0 40px 90px rgba(0,0,0,.5);display:flex;flex-direction:column}
.btop{background:#efe7d8;padding:12px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--sabbia)}
.bdot{width:11px;height:11px;border-radius:50%}
.burl{margin-left:14px;background:#fff;border-radius:8px;padding:7px 14px;font-size:.72rem;color:#7d6f5a;
  font-family:var(--font-title);flex:1;max-width:460px;display:flex;align-items:center;gap:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.badmin{padding:26px 30px;overflow:hidden;flex:1}
.badmin .eyebrow{color:var(--bronzo);font-size:.62rem;margin-bottom:6px}
.badmin h3{font-family:var(--font-serif);font-size:2rem;color:var(--ink);margin-bottom:20px}
.badmin h3 .italic{color:var(--bronzo)}
.statrow{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.statcard{background:var(--crema);border:1px solid var(--sabbia);border-radius:13px;padding:16px 18px}
.statcard .v{font-family:var(--font-serif);font-size:2rem;color:var(--bronzo-dark);line-height:1}
.statcard .l{font-family:var(--font-title);font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:#9c8b70;margin-top:7px}
.cols{display:grid;grid-template-columns:1.35fr 1fr;gap:18px}
.panel-t{font-family:var(--font-title);font-weight:600;font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:#7d6f5a;margin-bottom:12px}
.appt{display:flex;align-items:center;gap:14px;background:var(--crema);border:1px solid var(--sabbia);border-radius:12px;padding:13px 16px;margin-bottom:10px;transition:.5s}
.appt .time{font-family:var(--font-title);font-weight:700;font-size:.9rem;color:var(--ink);width:52px}
.appt .who{flex:1}.appt .who b{font-size:.86rem}.appt .who span{display:block;font-size:.7rem;color:#9c8b70;margin-top:2px}
.badge{font-family:var(--font-title);font-size:.56rem;letter-spacing:.1em;text-transform:uppercase;padding:5px 10px;border-radius:7px;font-weight:600}
.badge.att{background:rgba(197,138,58,.16);color:#8a5e22}
.badge.conf{background:rgba(79,157,134,.16);color:#2f6b55}
.badge.direct{background:rgba(79,157,134,.18);color:#2f6b55}
.badge.ota{background:rgba(60,90,120,.14);color:#3a5568}
.minibtn{font-family:var(--font-title);font-size:.6rem;font-weight:600;padding:7px 12px;border-radius:8px;border:none;cursor:default}
.minibtn.pri{background:linear-gradient(145deg,var(--bronzo),var(--bronzo-dark));color:#fff}
.sidecard{background:var(--crema);border:1px solid var(--sabbia);border-radius:13px;padding:16px 18px;margin-bottom:14px}
.sidecard .h{display:flex;align-items:center;gap:9px;font-family:var(--font-title);font-weight:600;font-size:.78rem;color:var(--ink);margin-bottom:6px}
.sidecard p{font-size:.72rem;color:#8a7c66;line-height:1.5}
.recovered{background:linear-gradient(145deg,rgba(79,157,134,.12),rgba(216,178,106,.1));border-color:rgba(79,157,134,.3)}
.recovered .v{font-family:var(--font-serif);font-size:1.9rem;color:#2f6b55}
.demo-flag{margin-left:auto;font-family:var(--font-title);font-size:.56rem;letter-spacing:.16em;text-transform:uppercase;
  color:#9c8b70;background:var(--crema);border:1px solid var(--sabbia);padding:6px 12px;border-radius:100px}
.btop .demo-flag{margin-right:2px}

/* ── scena confronto Booking vs diretto ────────────────────────────── */
.compare{align-items:center;justify-content:center;text-align:center}
.compare h2{font-size:clamp(1.9rem,3.6vw,2.8rem);color:var(--crema);margin-bottom:6px}
.compare .sub{color:var(--muted);font-weight:300;margin-bottom:30px;font-size:1.02rem;max-width:52ch}
.cmp{display:grid;grid-template-columns:1fr 1fr;gap:22px;width:100%;max-width:900px}
.cmp .card{border-radius:16px;padding:26px 26px;text-align:left}
.cmp .b{background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.12)}
.cmp .m{background:linear-gradient(160deg,rgba(216,178,106,.15),rgba(176,122,78,.12));border:1px solid rgba(216,178,106,.42)}
.cmp h4{font-family:var(--font-title);font-size:.66rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
.cmp .m h4{color:var(--gold)}
.cmp .big{font-family:var(--font-serif);font-size:2.5rem;line-height:1;color:var(--crema);margin-bottom:2px}
.cmp .big.gd{color:var(--gold)}
.cmp .cap{font-size:.74rem;color:var(--muted);margin-bottom:4px}
.cmp ul{list-style:none;margin-top:16px;display:flex;flex-direction:column;gap:11px}
.cmp li{font-size:.9rem;color:var(--crema-soft);line-height:1.4;display:flex;gap:10px;align-items:flex-start}
.cmp li svg{flex:none;margin-top:2px}

/* ── recap ─────────────────────────────────────────────────────────── */
.recap{align-items:center;justify-content:center;text-align:center}
.recap h2{font-size:clamp(2rem,4vw,3.2rem);color:var(--crema);margin-bottom:8px}
.recap .sub{color:var(--muted);font-weight:300;margin-bottom:34px;font-size:1.05rem}
.grid{display:flex;flex-wrap:wrap;justify-content:center;gap:14px;width:100%;max-width:840px}
.gcard{flex:0 1 250px;background:rgba(255,255,255,.04);border:1px solid rgba(216,178,106,.2);border-radius:14px;padding:20px 16px;text-align:left;display:flex;flex-direction:column;gap:10px}
.gcard .gic{width:38px;height:38px;border-radius:10px;background:rgba(216,178,106,.14);display:flex;align-items:center;justify-content:center}
.gcard b{font-family:var(--font-title);font-size:.82rem;color:var(--crema)}
.gcard span{font-size:.72rem;color:var(--muted);line-height:1.45}
.tagline{margin-top:38px;font-family:var(--font-serif);font-size:1.6rem;color:var(--crema)}
.tagline .italic{color:var(--gold)}

/* ── controlli ─────────────────────────────────────────────────────── */
.controls{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:30;display:flex;align-items:center;gap:14px;
  background:rgba(10,25,30,.72);backdrop-filter:blur(14px);border:1px solid rgba(216,178,106,.22);border-radius:100px;padding:10px 16px;transition:.4s}
.controls.hidden{opacity:0;pointer-events:none;transform:translate(-50%,20px)}
.ctrl-btn{background:none;border:none;color:var(--crema);cursor:pointer;width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:.25s}
.ctrl-btn:hover{background:rgba(216,178,106,.18)}
.progress{width:230px;height:5px;background:rgba(255,255,255,.12);border-radius:100px;overflow:hidden}
.progress .bar{height:100%;width:0;background:linear-gradient(90deg,var(--bronzo),var(--gold));transition:width .3s linear}
.counter{font-family:var(--font-title);font-size:.66rem;letter-spacing:.1em;color:var(--muted);min-width:42px;text-align:center}
.dots{display:flex;gap:6px;position:fixed;bottom:78px;left:50%;transform:translateX(-50%);z-index:25;
  background:rgba(10,25,30,.44);backdrop-filter:blur(8px);padding:8px 12px;border-radius:100px}
.dots i{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.28);transition:.3s;cursor:pointer}
.dots i.on{background:var(--gold);width:22px;border-radius:100px}

body.is-admin .brandbar, body.is-admin .livepill{opacity:0;pointer-events:none}
.brandbar,.livepill{transition:opacity .45s ease}

/* ══════════════════════════════════════════════════════════════════════
   MOBILE — il lead lo apre dal telefono: ogni scena si impagina in verticale.
   Lo stage smette di essere fisso, la pagina può scorrere, niente taglio.
   ══════════════════════════════════════════════════════════════════════ */
@media (max-width:768px){
  html,body{height:auto}
  body{overflow-x:hidden;overflow-y:auto}

  /* stage: da riquadro fisso a colonna che scorre */
  .stage-wrap{position:static;inset:auto;display:block;height:auto;min-height:100vh;padding:74px 15px 132px}
  .stage{width:100%;height:auto;perspective:none}
  .scene{position:relative;inset:auto;height:auto;min-height:calc(100vh - 206px);
    justify-content:center;transition:opacity .45s ease}

  /* header compatto, la livepill è solo rumore su schermo piccolo */
  .brandbar{top:14px;left:15px;gap:10px}
  .brandmark{width:38px;height:38px;font-size:1rem}
  .brandbar .n{font-size:1.08rem}
  .brandbar .s{font-size:.52rem;letter-spacing:.22em}
  .livepill{display:none}

  /* cover */
  .cover h1{font-size:clamp(1.9rem,8.4vw,2.7rem);max-width:15ch}
  .cover .eyebrow{margin-bottom:16px;font-size:.62rem}
  .cover .sub{font-size:.95rem;margin-top:18px}
  .cover .hint{margin-top:30px}

  /* scena automazione: testo sopra, telefono sotto, centrati */
  .auto{flex-direction:column;gap:26px;align-items:center;text-align:center}
  .auto .left{flex:none;width:100%}
  .auto .kicker{justify-content:center}
  .auto h2{font-size:clamp(1.6rem,6.6vw,2.2rem)}
  .trigger{margin:14px auto 16px}
  .benefit{margin:8px auto 0;max-width:40ch;text-align:left}
  .chips{justify-content:center;margin-top:20px}
  .route{margin:18px auto 0}
  .phone{width:min(290px,82vw);height:auto;aspect-ratio:320/560;padding:14px}
  .phone::before{width:104px;height:22px}

  /* scena pannello: il frame browser si adatta e va in colonna */
  .admin{align-items:stretch}
  .browser{height:auto;max-height:none}
  .btop{padding:10px 12px}
  .burl{margin-left:8px;padding:6px 10px;font-size:.62rem}
  .demo-flag{font-size:.5rem;padding:4px 8px;letter-spacing:.1em}
  .badmin{padding:20px 16px}
  .badmin h3{font-size:1.5rem;margin-bottom:16px}
  .statrow{grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:18px}
  .statcard{padding:13px 14px}
  .statcard .v{font-size:1.55rem}
  .cols{grid-template-columns:1fr;gap:22px}
  .recovered .v{font-size:1.7rem}

  /* confronto Booking vs diretto */
  .compare .sub{font-size:.95rem;margin-bottom:22px}
  .cmp{grid-template-columns:1fr;gap:16px}
  .cmp .card{padding:22px 20px}
  .cmp .big{font-size:2.2rem}

  /* recap: due card per riga */
  .recap h2{font-size:clamp(1.8rem,7vw,2.4rem)}
  .recap .sub{font-size:.95rem;margin-bottom:26px}
  .grid{gap:10px}
  .gcard{flex:1 1 calc(50% - 10px);padding:16px 14px}
  .tagline{margin-top:28px;font-size:1.3rem;line-height:1.35}

  /* controlli: barra stretta che entra nello schermo */

<script>
/* ════════════════════════════════════════════════════════════════════

const BRAND = {

  // derivata dal volume: camere × ~prezzoNotte × occup.~45% × quota OTA ~70% × commissione ~15%,
  // arrotondata per DIFETTO. Marcata "stima" a schermo. NON è il prezzo del servizio (349+10% resta fuori).
  camere: 3,                       // dimora storica, ~3 camere
  prezzoNotte: 90,                 // €/notte medio
  stimaAnnua: 4000,                // ~4.000€/anno a Booking (stima prudente)
  // URL REALE del demo che il lead riceve (compare nella barra del pannello).
  // NON un dominio inventato: quello che vede è quello che gli si apre.
  sito: "sulleviedelcapo.it"
};

(function(){
  document.getElementById('bn').innerHTML = BRAND.nome;
  document.getElementById('bc').textContent = BRAND.citta;

/* icone SVG (no emoji) */
const I = {

  { n:'06', ic:I.star, chip:'Recensione post-soggiorno', title:'Più recensioni <span class="italic">5 stelle</span>',
    tlab:'Si attiva', trig:'dopo il check-out',

    head:['Com’è andato il soggiorno?','a '+N], review:true,

/* costruttore telefono */
function phoneHTML(a){
  let body = '';
  if(a.review){
    body = `<div class="thread">
      <div class="bubble in" style="animation-delay:.15s"><div class="top">${N}</div>${a.bub[1]}
        <div class="stars" style="margin-top:12px">${starRow(5,'#d8b26a')}</div>
      </div>
      <div class="sent in">${I.check}<span>Inviato in automatico · nessun lavoro manuale</span></div>
    </div>`;
  } else {
    body = `<div class="thread">
      <div class="bubble in" style="animation-delay:.2s"><div class="top">${a.bub[0]}</div>${a.bub[1]||''}
      ${a.cta?`<div class="cta">${a.cta}</div>`:''}</div>
      <div class="sent in">${I.check}<span>${a.owner?'Notifica inviata a te in tempo reale':'Inviato in automatico · nessun lavoro manuale'}</span></div>
    </div>`;
  }
  return `<div class="phone"><div class="screen">
    <div class="statusbar"><span>9:41</span><span class="nm">${N}</span></div>
    <div class="notif-head"><div class="ic">${a.ic}</div><div class="t">${a.head[0]}<span>${a.head[1]}</span></div></div>
    ${body}
  </div></div>`;
}

function autoSceneHTML(a,idx){
  const chips = AUTO.map((x,i)=>`<div class="chip ${i===idx?'active':(i<idx?'done':'')}">${x.chip}</div>`).join('');
  return `<div class="left">
      <div class="kicker"><span class="eyebrow">Il sistema al lavoro</span><span class="num">${a.n} / ${String(AUTO.length).padStart(2,'0')}</span></div>
      <h2 class="serif">${a.title}</h2>
      <div class="trigger"><span class="tlab">${a.tlab}</span> ${a.trig}</div>
      <div class="benefit">${I.goldcheck}<div>${a.benefit}</div></div>
      ${a.review?`<div class="route">
        <div class="r g">Soddisfatto<br>→ recensione su Google ★</div>
        <div class="r p">Critica<br>→ privata, solo a te</div>
      </div>`:''}
      <div class="chips">${chips}</div>
    </div>
    ${phoneHTML(a)}`;
}

/* ── confronto Booking vs diretto ─────────────────────────────────── */
function compareHTML(){
  const pn = BRAND.prezzoNotte, cam = BRAND.camere, stima = BRAND.stimaAnnua;
  const fmt = n => String(n).replace(/\B(?=(\d{3})+(?!\d))/g,'.');   // separatore migliaia (garantito, no dipendenza locale)
  const soggEx = pn*3, lossEx = Math.round(soggEx*0.20);   // esempio: 3 notti al tuo prezzo, fino al 20% a Booking
  return `<h2 class="serif">Ogni anno una parte del tuo incasso <span class="italic">resta a Booking</span></h2>
    <div class="sub">Sulle tue ${cam} camere a circa ${pn}€ a notte, la stima è di circa <b>${fmt(stima)}€ l’anno</b> di commissioni. Ecco lo stesso soggiorno, due conti diversi.</div>
    <div class="cmp">
      <div class="card b">
        <h4>Con Booking</h4>
        <div class="big">−${fmt(stima)}€<span style="font-size:1.1rem;color:var(--muted);font-family:var(--font-title);"> / anno</span></div>
        <div class="cap">stima prudente sul tuo volume · fino al 20% su ogni prenotazione</div>
        <ul>
          <li>${I.xred}<div>Un soggiorno da ${soggEx}€ (3 notti) lascia fino a −${lossEx}€, ogni volta</div></li>
          <li>${I.xred}<div>Paghi la commissione anche sui clienti che tornano</div></li>
          <li>${I.xred}<div>Il cliente è di Booking, non tuo</div></li>
        </ul>
      </div>
      <div class="card m">
        <h4>Con il tuo sistema</h4>
        <div class="big gd">0€</div>
        <div class="cap">di commissione OTA sulle prenotazioni dirette</div>
        <ul>
          <li>${I.goldcheck}<div>Le prenotazioni dirette non pagano percentuali a nessuno</div></li>
          <li>${I.goldcheck}<div>Il cliente torna da te, non da Booking</div></li>
          <li>${I.goldcheck}<div>Un canale di prenotazioni tuo, che resta tuo</div></li>
        </ul>
      </div>
    </div>`;
}

const scenes = [];
scenes.push({ cls:'cover', dur:4600, html:()=>`
  <span class="eyebrow">${N} · sistema di prenotazione diretta</span>

  <div class="hint">— gira tutto da solo —</div>`});
scenes.push({ cls:'compare', dur:7500, html:compareHTML });   /* il gancio economico subito dopo la cover: ferisce prima delle 7 automazioni (la soluzione) */

/* ── player ───────────────────────────────────────────────────────── */
const stage=document.getElementById('stage'), dotsBox=document.getElementById('dots');
let cur=-1, playing=true, timer=null, rafStart=0, rafDur=0, rafId=null;
scenes.forEach((_,i)=>{ const d=document.createElement('i'); d.onclick=()=>go(i); dotsBox.appendChild(d); });
const dotEls=[...dotsBox.children];

function render(i){
  const s=scenes[i];
  const el=document.createElement('div');
  el.className='scene '+s.cls; el.innerHTML=s.html();
  stage.innerHTML=''; stage.appendChild(el);
  document.body.classList.toggle('is-admin', s.cls==='admin');
  requestAnimationFrame(()=>el.classList.add('on'));
}
function go(i){
  cur=(i+scenes.length)%scenes.length;
  render(cur);
  if(window.innerWidth<=768){ try{window.scrollTo(0,0)}catch(e){} }
  dotEls.forEach((d,k)=>d.classList.toggle('on',k===cur));
  document.getElementById('counter').textContent=`${cur+1} / ${scenes.length}`;
  if(playing) startTimer();
}
function startTimer(){
  clearTimeout(timer); cancelAnimationFrame(rafId);
  rafStart=performance.now(); rafDur=scenes[cur].dur;
  const bar=document.getElementById('bar');
  const tick=(t)=>{ const p=Math.min(1,(t-rafStart)/rafDur); bar.style.width=(p*100)+'%'; if(p<1&&playing) rafId=requestAnimationFrame(tick); };
  rafId=requestAnimationFrame(tick);
  timer=setTimeout(()=>{ if(playing) go(cur+1); }, rafDur);
}
function setPlaying(v){
  playing=v;
  document.getElementById('playIcon').innerHTML = v
    ? '<path d="M6 4h4v16H6zM14 4h4v16h-4z"/>'
    : '<path d="M8 5v14l11-7z"/>';
  if(v) startTimer(); else { clearTimeout(timer); cancelAnimationFrame(rafId); }
}
document.getElementById('play').onclick=()=>setPlaying(!playing);
document.getElementById('next').onclick=()=>{ go(cur+1); };
document.getElementById('prev').onclick=()=>{ go(cur-1); };
document.getElementById('restart').onclick=()=>{ setPlaying(true); go(0); };
const controls=document.getElementById('controls');
document.addEventListener('keydown',e=>{
  if(e.code==='Space'){ e.preventDefault(); setPlaying(!playing); }
  else if(e.code==='ArrowRight'){ go(cur+1); }
  else if(e.code==='ArrowLeft'){ go(cur-1); }
  else if(e.key==='r'||e.key==='R'){ setPlaying(true); go(0); }
  else if(e.key==='h'||e.key==='H'){ controls.classList.toggle('hidden'); dotsBox.style.opacity=dotsBox.style.opacity==='0'?'1':'0'; }
});
go(0);
</script>
</body>
</html>
